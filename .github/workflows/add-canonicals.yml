name: Add/Update Canonical Tags
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  canonicals:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'canonical tags automatisch gesetzt')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject canonical tags into all HTML files
        run: |
          BASE_URL="https://autismus-adhs-alltag.de"
          find . -name "*.html" \
            ! -path "./.github/*" \
            ! -path "./node_modules/*" \
          | while IFS= read -r file; do
            RELATIVE="${file#./}"
            ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe='/:.-_~'))" "$RELATIVE")
            if [[ "$RELATIVE" == "index.html" ]]; then
              URL="${BASE_URL}/"
            elif [[ "$RELATIVE" == */index.html ]]; then
              DIR=$(dirname "$ENCODED")
              URL="${BASE_URL}/${DIR}/"
            else
              URL="${BASE_URL}/${ENCODED}"
            fi
            if grep -q 'rel="canonical"' "$file"; then
              sed -i "s|<link rel=\"canonical\"[^>]*>|<link rel=\"canonical\" href=\"${URL}\">|g" "$file"
              echo "✏️ Updated: $RELATIVE → $URL"
            else
              sed -i "s|</head>|  <link rel=\"canonical\" href=\"${URL}\">\n</head>|g" "$file"
              echo "✅ Added: $RELATIVE → $URL"
            fi
          done

      - name: Commit & Push
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet && echo "Keine Änderungen." || (
            git commit -m "SEO: canonical tags automatisch gesetzt" &&
            git pull --rebase origin main &&
            git push
          )
